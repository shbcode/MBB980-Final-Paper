# Experiment 2: fixed-context fairness
output_dir: results/fixed_context
cache_dir: data/raw
seed: 0

task: xnli
languages: [en, zh]
budgets: [512, 1024, 2048]
n_query: 50
demo_pool: 32

instructions:
  en: "Classify the relation between premise and hypothesis as one of: entailment, neutral, contradiction."
  zh: "判断前提和假设之间的关系，回答：蕴含、中立 或 矛盾。"

# Tokenizer used to *measure* the budget (matches the served model in production).
measure_tokenizer: tiktoken_cl100k

# Backend for actual generation.
# Default: OpenAI gpt-4o-mini (cheap, multilingual, lowest setup friction).
# Requires the OPENAI_API_KEY environment variable.
# Estimated cost for this config (50 queries x 3 budgets x 2 langs ~= 300 calls,
# avg ~1k prompt tokens, ~10 completion tokens): ~$0.10 for one full run.
backend:
  kind: openai
  model: gpt-4o-mini
  # --- Alternative: local HuggingFace model (needs `pip install '.[hf]'` and a GPU)
  # kind: hf_local
  # model_id: Qwen/Qwen2.5-7B-Instruct
  # dtype: bfloat16
  # --- Alternative: Together AI (OpenAI-compatible). Requires TOGETHER_API_KEY.
  # kind: openai
  # base_url: https://api.together.xyz/v1
  # api_key: ${TOGETHER_API_KEY}
  # model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
  # --- Offline smoke test (returns "OK" for everything; metrics will be degenerate)
  # kind: dummy

max_new_tokens: 16
temperature: 0.0

# Optional ablations:
equal_demo_count: null   # if set, both languages use the same number of demos
byte_normalized: false
